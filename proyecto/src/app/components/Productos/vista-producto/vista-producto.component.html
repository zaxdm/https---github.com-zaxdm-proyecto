<!-- vista-producto.component.html  — sin carrito propio, lo maneja app-carrito-global -->
<section class="vp-page">

  <!-- HEADER -->
  <div class="vp-header">
    <div class="vp-header-inner">
      <button class="btn-volver" (click)="volver()">
        <i class="icon_arrow-left"></i> Productos
      </button>
      <h1>{{ categoria.titulo }}</h1>
      <p class="vp-desc">{{ categoria.descripcion }}</p>
    </div>
  </div>

  <!-- GRID -->
  <div class="vp-grid-wrap">
    <div class="vp-grid">
      <div class="item-card" *ngFor="let item of categoria.items">
        <div class="item-img">
          <img [src]="item.img" [alt]="item.nombre" />
        </div>
        <div class="item-body">
          <h3>{{ item.nombre }}</h3>
          <p>{{ item.descripcion }}</p>
        </div>
        <div class="item-footer">
          <span class="item-precio">S/ {{ item.precio | number:'1.2-2' }}</span>
          <button
            class="btn-agregar"
            [class.agregado]="estaAgregado(item.id)"
            (click)="agregarAlCarrito(item)"
          >
            <span *ngIf="!estaAgregado(item.id)"><i class="icon_plus"></i> Agregar</span>
            <span *ngIf="estaAgregado(item.id)"><i class="icon_check_alt2"></i> Agregado</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</section>
